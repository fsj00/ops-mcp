name: redis_scan
version: "1.0"
description: Redis SCAN 游标扫描（必须提供 limit，默认上限 1000）
type: query

target:
  type: redis

input:
  redis:
    type: string
    required: true
    description: redis.yaml 中的实例 name

  db:
    type: number
    required: false
    description: Redis 逻辑库编号（SELECT），缺省 0

  cursor:
    type: number
    required: false
    description: SCAN 游标，默认 0
  match:
    type: string
    required: false
    description: MATCH 模式，默认 *
  limit:
    type: number
    required: true
    description: 本次最多返回的 key 数（必填，且不超过 redis.yaml limit，缺省上限 1000）

runtime: javascript
timeout: 30s
