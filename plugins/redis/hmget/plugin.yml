name: redis_hmget
version: "1.0"
description: Redis HMGET（批量读取 hash 字段；缺失字段 value 为 null；fields 数量受 redis.yaml limit 约束）
type: query

target:
  type: redis

input:
  redis:
    type: string
    required: true
    description: redis.yaml 中的实例 name

  db:
    type: number
    required: false
    description: Redis 逻辑库编号（SELECT），缺省 0

  key:
    type: string
    required: true
    description: Hash key

  fields:
    type: array
    required: true
    description: 要读取的 field 列表（非空；数量不超过 redis.yaml limit，缺省上限 1000）
runtime: javascript
timeout: 30s
