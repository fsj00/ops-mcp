name: redis_role
version: "1.0"
description: Redis ROLE（主从角色信息）
type: query

target:
  type: redis

input:
  redis:
    type: string
    required: true
    description: redis.yaml 中的实例 name

  db:
    type: number
    required: false
    description: Redis 逻辑库编号（SELECT），缺省 0

runtime: javascript
timeout: 30s
