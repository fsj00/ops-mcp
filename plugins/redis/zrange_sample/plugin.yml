name: redis_zrange_sample
version: "1.0"
description: Redis ZRANGE 采样（必须提供 limit，禁止全量导出）
type: query

target:
  type: redis

input:
  redis:
    type: string
    required: true
    description: redis.yaml 中的实例 name

  db:
    type: number
    required: false
    description: Redis 逻辑库编号（SELECT），缺省 0

  key:
    type: string
    required: true
    description: ZSet key
  limit:
    type: number
    required: true
    description: 最多返回成员数（必填，且不超过 redis.yaml limit，缺省上限 1000）
runtime: javascript
timeout: 30s
