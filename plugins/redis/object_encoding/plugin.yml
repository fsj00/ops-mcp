name: redis_object_encoding
version: "1.0"
description: Redis OBJECT ENCODING（内部编码）
type: query

target:
  type: redis

input:
  redis:
    type: string
    required: true
    description: redis.yaml 中的实例 name

  db:
    type: number
    required: false
    description: Redis 逻辑库编号（SELECT），缺省 0

  key:
    type: string
    required: true
    description: Redis key
runtime: javascript
timeout: 30s
