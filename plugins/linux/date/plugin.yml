name: linux_date
version: "1.0"
description: 查看系统当前时间（date）
type: command
target:
  type: ssh
input:
  host:
    type: string
    required: true
    description: hosts.yaml 中的主机 name
  format:
    type: string
    required: false
    description: date 格式串（+FORMAT），如 +%Y-%m-%d %H:%M:%S
runtime: javascript
timeout: 10s
