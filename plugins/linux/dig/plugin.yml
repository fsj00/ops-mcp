name: linux_dig
version: "1.0"
description: DNS 查询（dig）
type: command
target:
  type: ssh
input:
  host:
    type: string
    required: true
    description: hosts.yaml 中的主机 name
  name:
    type: string
    required: true
    description: 要查询的域名
  type:
    type: string
    required: false
    description: 记录类型，如 A / AAAA / MX，默认 A
  server:
    type: string
    required: false
    description: 指定 DNS 服务器（@server）
runtime: javascript
timeout: 15s
