name: postgres_query
version: "1.0"
description: 在指定 PostgreSQL 库上执行只读 SELECT（经语义校验，自动附加 LIMIT）
type: query

target:
  type: postgresql

input:
  database:
    type: string
    required: true
    description: databases.yaml 中的数据库 name
  sql:
    type: string
    required: true
    description: SELECT 语句（非 SELECT 会被拒绝）

runtime: javascript
timeout: 30s
